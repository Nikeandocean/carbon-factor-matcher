<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Factor Matcher MCP — Buy Pro</title>
    <style>
        body {
            background-color: #0d1117;
            color: #ecf2f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        .container { text-align: center; padding: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: #8b949e; font-size: 1.2rem; margin-bottom: 30px; }
        .buy-btn {
            display: inline-block;
            background-color: #238636;
            color: #ffffff;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }
        .buy-btn:hover { background-color: #2ea043; }
        .buy-btn:disabled {
            background-color: #21262d;
            color: #8b949e;
            cursor: not-allowed;
        }
        .footer { color: #8b949e; font-size: 0.9rem; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Carbon Factor Matcher MCP</h1>
        <p class="subtitle">Intelligent emission factor matching for carbon accounting &amp; LCA</p>

        <button id="buyButton" class="buy-btn" disabled>Loading Payment Gateway...</button>

        <p class="footer">One-time purchase · Lifetime access · PayPal &amp; WeChat Pay</p>
        <p style="margin-top: 1rem;"><a href="demo.html" style="color: #58a6ff; text-decoration: none; font-size: 0.9rem;">Try the free demo first →</a></p>
    </div>

    <script type="text/javascript">
        (function () {
            var script = document.createElement('script');
            script.src = 'https://cdn.paddle.com/paddle/v3/paddle.js';
            script.async = true;

            script.onload = function () {
                console.log("Paddle SDK loaded.");
                try {
                    Paddle.Environment.set('production');
                    Paddle.Initialize({
                        token: "live_d5cceb859b6516f59cdcbf75420"
                    });

                    var btn = document.getElementById('buyButton');
                    btn.innerText = "Buy Pro License — $5 USD";
                    btn.removeAttribute('disabled');

                    btn.addEventListener('click', function() {
                        Paddle.Checkout.open({
                            settings: {
                                displayMode: "overlay",
                                theme: "dark",
                                locale: "en"
                            },
                            items: [{
                                priceId: "pri_01kvcaxdehj24q7nftmd2r513r",
                                quantity: 1
                            }]
                        });
                    });
                } catch (e) {
                    alert("Paddle Init Error: " + e.message);
                }
            };

            script.onerror = function () {
                var btn = document.getElementById('buyButton');
                btn.innerText = "Network Error — VPN Required";
                alert("Cannot connect to Paddle payment gateway. Please enable global proxy mode.");
            };

            document.head.appendChild(script);
        })();
    </script>
</body>
</html>
